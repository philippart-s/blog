- name: BreizhCamp
  postDate: 2026-06-29
  talksUrl: breizhcamp-2026
  date: 25 juin 2026
  excerpt: "Conférences données lors de BreizhCamp 2026"
  categories: Conférences
  tags:
    - Slides
    - Replays
  talks:
    - title: "JBang, un fichier Java pour les gouverner tous ? 💍"
      id: "jbang"
      location: Rennes (🇫🇷)
      language: Français
      date: 25 juin 2026
      time: 17h00
      duration: 25 minutes
      pitch: |
        Dans le monde Java, nous sommes habitués à initialiser un projet avec de nombreux fichiers et répertoires.
        A tel point que des CLI ont vu le jour pour nous aider à créer les projets SpringBoot ou Quarkus par exemple.
        Vient ensuite le choix du "package manager" : Maven ou Gradle ?
        Et c'est seulement à partir de là que l'on peut commencer à développer puis exécuter son code 😅.

        Toutes ces étapes fastidieuses expliquent pourquoi, lorsque que l'on a besoin de faire un développement rapide de quelques lignes pour automatiser une action, on préfère d'autres langages à Java : Python par exemple.
  
        Et si je vous disais, qu'avec JBang, vous allez pouvoir rester avec votre langage préféré, Java, et développer une classe toute simple (avec des dépendances externes) en quelques secondes !

        C'est le pari (spoiler : réussi) de JBang que je vous propose de découvrir durant une session de live coding.
  
        A vous les joies du scripting en Java !
      slides: https://docs.google.com/presentation/d/e/2PACX-1vTgTX2QlPi_fmV9f6BcrUq22lz8aE8Q7QioOphQhre_QR5I1KV62inYD3VrmozMYVsKspyO8lGu7dVg/pub
      source: https://github.com/philippart-s/jbang
      replay:
    - title: "🧰 Les dev containers, la boîte à outils ultime pour les devs ?"
      id: "dev-containers"
      location: Rennes (🇫🇷)
      language: Français
      date: 26 juin 2026
      time: 16h
      duration: 25mins
      pitch: |
        On a toutes et tous été confronté•es, un jour, à devoir (ré)installer tout notre environnement de développement lors d'un changement de machine. Que ce soit par choix ou juste en mode "on-boarding" lors d'un changement de société, de mission, ... On a aussi, parfois, passé de longues heures pour comprendre quels outils installer pour proposer une PR ou MR dans un projet Open Source.

        Dans encore beaucoup d'autres cas, nous sommes vite confrontés à l'enfer de la configuration des outils et autres frameworks pour faire ce que l'on aime : développer. Et je ne vous parle pas des montées de versions et inter-dépendances 😅...
        
        Heureusement, il existe une solution à tous ces problèmes : les dev containers.
        
        Lors de ce tools-in-action, je vous propose de partir à leur découverte. La seule chose que je m'autorise à installer sur ma machine : Docker ! Le reste sera de la gestion de configuration pour que les outils, les frameworks et la gestion des versions et dépendances soit un non-évènement dans votre process de développement.
  
        Vous repartirez en sachant utiliser les dev containers mais aussi en sachant construire as-code votre stack de développement.
      source: https://github.com/philippart-s/dev-containers-talk
      slides: https://docs.google.com/presentation/d/e/2PACX-1vRRYh9lPgZ9OXdSOzDDv85cbPWAM4jx7mKHLGPHcozlP7SGN4SwweRqLkUq9FmLdqa-A9FYuxAM9u6i/pub
      replay:

- name: Paris JUG
  postDate: 2026-06-17
  talksUrl: paris-jug-2026
  date: 2 juin 2026
  excerpt: "Conférence donnée lors de Paris JUG 2026"
  categories: Conférences
  tags:
    - Slides
    - Replays
  talks:
    - title: "☕️ Toi aussi crée ta CLI boostée à l'IA avec Picocli 🖥️ 🤖"
      id: "picocli"
      location: Paris (🇫🇷)
      language: Français
      date: 2 juin 2026
      time: 21h00
      duration: 50 minutes
      pitch: |
        Les CLI (Command Line Interface), tout le monde les utilise et elles existent depuis la nuit des temps.
        Dernièrement, elles reviennent sur le devant de scène avec les CLI boostées à l'IA devenant des vrais collègues de pair programming.
        
        Souvent synonymes de gain de productivité, leur création est parfois obscure et peut sembler complexe.
        C'était le cas il y a quelques décennies, mais depuis quelques années, des langages et Frameworks permettent d'en écrire simplement dans votre langage préféré.
        Je vous propose d'utiliser un langage qui ne paraît pas, au premier abord, le plus intuitif pour faire une CLI : Java !
        
        Mais il sera bien accompagné dans cette tâche : grâce à Picocli et Quarkus, notre CLI aura tout d'une grande, tout en étant simple à développer !
        Et cerise sur le gâteau : nous créerons un "vrai" exécutable grâce à Graal VM.
        
        Venez m'accompagner lors d'une session de live coding permettant de mettre en lumière comment créer une CLI en Java avec Picocli et Quarkus en partant de zéro !
        
        Et qui sait, avec un peu de magie on aura, au final, un vrai assistant intelligent dans notre et terminal 🤖.
      slides: https://docs.google.com/presentation/d/e/2PACX-1vQL4VmxdFuHSM-8Rj6yOKac0vMjXi883QV1S3YI2Wj7W82cu1bpVjvxc8Ri6GQfgUdQPtE-fdQMniWf/pub
      source: https://github.com/philippart-s/jarvis
      replay:

- name: DevOpsdays Genève
  postDate: 2026-05-22
  talksUrl: devoxx-geneva-2026
  date: 21 mai 2026
  excerpt: "Workshop donné lors de DevOpsdays Genève 2026"
  categories: Conférences
  tags:
    - Slides
    - Replays
  talks:
    - title: "🧩 Développer avec l'IA : et si c'était aussi simple qu'ajouter une librairie ? 🤘"
      id: "ai-lib-workshop"
      location: DevOpsdays Geneva (🇨🇭)
      language: Français
      date: Mercredi 21 mai 2026
      time: 14h55 - 16h25
      duration: 1h30
      pitch: |
        Intégrer de l'intelligence artificielle (IA) dans nos développements peut nous paraître plus complexe que de les utiliser dans notre quotidien.
        
        Dois-je apprendre un nouveau langage ou une nouvelle stack ?
        Durant ce workshop nous vous proposons de vous donner tous les éléments pour intégrer l'IA sans quitter votre langage de prédilection : Java 😍. Ce sera l'occasion de découvrir les Frameworks du moments : LangChain4j, Quarkus, ...
        
        Nous vous invitons à découvrir toutes les facettes d'un chatbot avec l'IA générative (customiser un prompt, rajouter vos données (RAG), appeler des outils locaux ou distants (MCP) et créer des agents) mais aussi parce que l’IA ne se limite pas aux chatbots : faire de la transcription, créer de l'audio ou même faire un traducteur.
        
        À la suite de ce talk vous repartirez avec une boîte à outils vous permettant d'intégrer simplement la puissance des modèles d'IA au sein de vos développements de tous les jours.
        Et, toujours pour vous simplifier la vie, venez juste avec votre ordinateur et un navigateur Internet, on se charge du reste pour vous construire un environnement de développement aux petits oignons grâce aux CDE.
      source: https://github.com/devrel-workshop/ai-as-lib-workshop
      slides: https://docs.google.com/presentation/d/e/2PACX-1vSjTspv3TfMlXvlDuY-AulXOkc1PPGB9yyTHkiLST8vIAzEd5FHnmXD9hDuvqr5goxxqRGdcrC6Pswo/pub
      replay:

- name: Devoxx UK
  postDate: 2026-05-08
  talksUrl: devoxx-uk-2026
  date: 06 mai 2026
  excerpt: "Talk donné lors de Devoxx UK 2026"
  categories: Conférences
  tags:
    - Slides
    - Replays
  talks:
    - title: "🧰 Dev Containers: the ultimate toolbox for developers?"
      id: "dev-containers"
      location: Devoxx UK (🇬🇧)
      language: English
      date: Jeudi 6 mai 2026
      time: 18h - 18h30
      duration: 30mins
      pitch: |
        At some point, we’ve all had to (re)install our entire development environment after switching machines.
        Whether by choice or simply during on-boarding at a new company, a new mission,...
        We’ve also all spent far to many hours figuring out which tools to install just to submit a PR or MR to an open source project.

        And in many other situations, we quickly find ourselves facing the nightmare of configuring tools and frameworks when all we really want to do is what we love: coding.
        And let’s not even get started on version updates and inter-dependencies 😅...

        Fortunately, there is a solution to all these problems: dev containers.
  
        During this tools-in-action session, I invite you to explore them with me.
        The only thing I allow myself to install on my machine: Docker!
        Everything else will be handled through configuration so that tools, frameworks, version management, and dependencies become a non-event in your development workflow.

        You’ll leave knowing how to use dev containers—and how to build your entire development stack as code.
      source: https://github.com/philippart-s/dev-containers-talk
      slides: https://docs.google.com/presentation/d/e/2PACX-1vQCZLxTPpC2cVsxoVdF7Fcxuo0-IIhWMd3HYae2ymkhaWAHtCAEKbrXsI_rNRjISMhjBdjFECqLjQMl/pub
      replay:

